<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <section class="main">
         <div class="sider">
             <div class="home btn">
                <img src="/src/icons/home.svg"/>
                <p>home</p>
             </div>
             <div class="short btn ">
                <img src="/src/icons/shorts.svg"/>
                <p>shorts</p>
             </div>
             <div class="sub btn ">
                <img src="/src/icons/subscriptions.svg">
                <p>subscribtion</p>
             </div>
             <div class="profile btn ">
                <img src="/src/icons/profile.svg">
                <p>You</p>
            </div>
        </div>

        <div class="mainContent">
        </div>

        <div class="searchBar">
            <div class="menuToggle ">
                <img src="/src/icons/menu.svg"/>
             </div>
            <div class="youtubeLogo">
                <img src="/src/icons/youtube.png"/>
            </div>
            <div class="searchInputContainner">
                <input class="searchInput" type="text" placeholder="Search"/>
                <div class="searchIcon"><img src="/src/icons/search.svg"/></div>
            </div>
            <div class="userProfile">
                sign in
            </div>
        </div>
    </section>
</body>
</html>
